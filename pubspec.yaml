name: appainter
description: A material theme editor and generator for Flutter to configure and
  preview the overall visual theme of your material app
publish_to: "none"
version: 2.7.5

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: 3.38.0

dependencies:
  device_preview_plus: 2.6.1
  file_picker: 10.3.10
  flex_color_picker: 3.8.0
  flutter:
    sdk: flutter
  flutter_markdown: 0.7.7
  google_fonts: 7.1.0
  json_theme: 9.0.3
  lucide_flutter: ^1.7.0
  material_color_utilities: ^0.11.1
  pretty_json: 2.0.0
  provider: ^6.1.2
  random_color_scheme: 0.1.4
  shared_preferences: 2.5.4
  universal_html: 2.3.0
  universal_io: 2.3.1
  window_manager: 0.5.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: 1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon_plain.png
    - USAGE.md
